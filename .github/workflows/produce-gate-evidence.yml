name: produce-gate-evidence

on:
  workflow_call:
    inputs:
      base_oid:
        required: true
        type: string
      head_oid:
        required: true
        type: string
      object_format:
        required: true
        type: string
      provider_repository_id:
        required: true
        type: string
      producer_workflow_sha:
        required: true
        type: string
      repository:
        required: true
        type: string

permissions:
  contents: read

jobs:
  gate-execution:
    name: gate-execution
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Validate fixed provider inputs
        env:
          BASE_OID: ${{ inputs.base_oid }}
          HEAD_OID: ${{ inputs.head_oid }}
          OBJECT_FORMAT: ${{ inputs.object_format }}
          PRODUCER_WORKFLOW_SHA: ${{ inputs.producer_workflow_sha }}
          PROVIDER_REPOSITORY_ID: ${{ inputs.provider_repository_id }}
          REPOSITORY: ${{ inputs.repository }}
        shell: bash
        run: |
          [[ "$BASE_OID" =~ ^[a-f0-9]{40}$ ]]
          [[ "$HEAD_OID" =~ ^[a-f0-9]{40}$ ]]
          [[ "$OBJECT_FORMAT" == "sha1" ]]
          [[ "$PRODUCER_WORKFLOW_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ "$PROVIDER_REPOSITORY_ID" == "1303415307" ]]
          [[ "$REPOSITORY" == "Rockyyy-S/code-graph" ]]

      - name: Install checksum-pinned pnpm release
        env:
          PNPM_ARCHIVE_SHA256: dd19bfd8bcd33a3b38dcce335e8d233194c0a61ffe1f5bcf5047f60f6d4978b8 # pnpm v11.12.0 官方 release asset 摘要
          PNPM_ARCHIVE_URL: https://github.com/pnpm/pnpm/releases/download/v11.12.0/pnpm-linux-x64.tar.gz
        shell: bash
        run: |
          archive="$RUNNER_TEMP/pnpm-linux-x64-11.12.0.tar.gz"
          staging="$(mktemp -d "$RUNNER_TEMP/pnpm-11.12.0.XXXXXX")"
          cleanup_pnpm_staging() {
            rm -rf -- "$staging"
            rm -f -- "$archive"
          }
          trap cleanup_pnpm_staging EXIT
          curl --proto '=https' --proto-redir '=https' --tlsv1.2 --fail --location --retry 3 --show-error --silent \
            --output "$archive" "$PNPM_ARCHIVE_URL"
          printf '%s  %s\n' "$PNPM_ARCHIVE_SHA256" "$archive" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$staging" --no-same-owner --no-same-permissions -- pnpm dist
          staging_root="$(realpath -- "$staging")"
          source_pnpm="$(realpath -- "$staging/pnpm")"
          source_dist="$(realpath -- "$staging/dist")"
          [[ -f "$source_pnpm" && ! -L "$source_pnpm" && -s "$source_pnpm" ]]
          [[ "$source_pnpm" == "$staging_root/pnpm" ]]
          [[ -d "$source_dist" && ! -L "$source_dist" && "$source_dist" == "$staging_root/dist" ]]
          [[ -f "$source_dist/pnpm.mjs" && ! -L "$source_dist/pnpm.mjs" ]]
          while IFS= read -r -d '' link; do
            resolved_link="$(realpath -- "$link")"
            case "$resolved_link" in
              "$staging_root"/*) ;;
              *)
                echo "pnpm runtime 符号链接逃离已校验的 staging 目录。" >&2
                exit 1
                ;;
            esac
          done < <(find "$staging_root" -type l -print0)
          [[ ! -e /opt/trusted-pnpm ]]
          sudo install -d -o 0 -g 0 -m 0755 /opt/trusted-pnpm/bin
          sudo cp -a -- "$source_dist" /opt/trusted-pnpm/bin/dist
          sudo install -o 0 -g 0 -m 0755 "$source_pnpm" /opt/trusted-pnpm/bin/pnpm
          sudo chown -R 0:0 /opt/trusted-pnpm
          sudo chmod -R u+rwX,go+rX,go-w /opt/trusted-pnpm
          cleanup_pnpm_staging
          trap - EXIT

      - name: Checkout immutable GateHarness
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # 固定 v4 提交
        with:
          fetch-depth: 1
          path: trusted-harness
          persist-credentials: false
          ref: ee39f2af09a1070eb1b1cd52072c70fa0ec70a43
          repository: Rockyyy-S/code-graph-gate-controller

      - name: Checkout trusted registry state
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # 固定 v4 提交
        with:
          fetch-depth: 1
          path: trusted-state
          persist-credentials: false
          ref: main
          repository: Rockyyy-S/code-graph-gate-controller

      - name: Checkout exact candidate OID
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # 固定 v4 提交
        with:
          fetch-depth: 0
          path: candidate
          persist-credentials: false
          ref: ${{ inputs.head_oid }}
          repository: ${{ inputs.repository }}

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # 固定 v4 提交
        with:
          node-version: 24.18.0

      - name: Prepare isolated candidate identity and artifact directory
        shell: bash
        run: |
          sudo groupadd --gid 20001 gatecandidate
          sudo useradd --uid 20001 --gid 20001 --home-dir /tmp/gatecandidate-home --no-create-home --shell /usr/sbin/nologin gatecandidate
          sudo install -d -o 20001 -g 20001 -m 0700 /tmp/gatecandidate-install-home /tmp/gatecandidate-install-tmp
          install -d -m 0700 artifacts trusted-harness-home

      - name: Verify trusted pnpm for isolated execution
        shell: bash
        run: |
          [[ -f /opt/trusted-pnpm/bin/pnpm && ! -L /opt/trusted-pnpm/bin/pnpm && -x /opt/trusted-pnpm/bin/pnpm ]]
          [[ -f /opt/trusted-pnpm/bin/dist/pnpm.mjs && ! -L /opt/trusted-pnpm/bin/dist/pnpm.mjs ]]
          [[ "$(stat -c '%U:%G %a' /opt/trusted-pnpm/bin/pnpm)" == "root:root 755" ]]
          [[ "$(stat -c '%U:%G' /opt/trusted-pnpm/bin/dist/pnpm.mjs)" == "root:root" ]]
          [[ -z "$(find /opt/trusted-pnpm -perm /022 -print -quit)" ]]
          pnpm_version="$(sudo -u gatecandidate env -i --chdir=/tmp/gatecandidate-install-home \
            HOME=/tmp/gatecandidate-install-home \
            PATH=/opt/trusted-pnpm/bin \
            /opt/trusted-pnpm/bin/pnpm --version)"
          [[ "$pnpm_version" == "11.12.0" ]]

      - name: Install frozen dependencies without candidate lifecycle
        env:
          HEAD_OID: ${{ inputs.head_oid }}
          TRUSTED_PNPM_BIN: /opt/trusted-pnpm/bin
        shell: bash
        run: |
          cleanup_install_identity() {
            sudo pkill -KILL -u 20001 || true
            sudo rm -rf -- /tmp/gatecandidate-install-home /tmp/gatecandidate-install-tmp
          }
          trap cleanup_install_identity EXIT
          workspace_root="$(realpath -- "$GITHUB_WORKSPACE")"
          source_candidate="$(realpath -- candidate)"
          candidate_parent=/tmp/gatecandidate-root
          candidate_root="$candidate_parent/worktree"
          [[ "$source_candidate" == "$workspace_root/candidate" ]]
          [[ -d "$source_candidate/.git" && ! -L "$source_candidate/.git" ]]
          [[ "$(git -C "$source_candidate" rev-parse HEAD)" == "$HEAD_OID" ]]
          [[ "$(realpath -m -- "$candidate_parent")" == "$candidate_parent" && ! -e "$candidate_parent" ]]
          # 父目录保持 root-owned，阻止安装阶段替换固定候选路径。
          sudo install -d -o 0 -g 0 -m 0711 "$candidate_parent"
          sudo install -d -o 20001 -g 20001 -m 0700 "$candidate_root"
          sudo cp -a -- "$source_candidate/." "$candidate_root/"
          sudo chown -R 20001:20001 "$candidate_root"
          [[ "$(sudo git -c safe.directory="$candidate_root" -C "$candidate_root" rev-parse HEAD)" == "$HEAD_OID" ]]
          sudo -u gatecandidate env -i --chdir="$candidate_root" \
            CI=true \
            HOME=/tmp/gatecandidate-install-home \
            LANG=C.UTF-8 \
            PATH="$TRUSTED_PNPM_BIN:$PATH" \
            TMPDIR=/tmp/gatecandidate-install-tmp \
            XDG_CACHE_HOME=/tmp/gatecandidate-install-home/.cache \
            XDG_CONFIG_HOME=/tmp/gatecandidate-install-home/.config \
            XDG_DATA_HOME=/tmp/gatecandidate-install-home/.local/share \
            pnpm install --frozen-lockfile --ignore-pnpmfile --ignore-scripts
          cleanup_install_identity
          trap - EXIT
          # 从候选 UID 无法访问的原 checkout 恢复 Git 元数据，再拒绝任何 tracked 漂移。
          sudo rm -rf -- "$candidate_root/.git"
          sudo cp -a -- "$source_candidate/.git" "$candidate_root/.git"
          sudo install -d -o 0 -g 0 -m 0711 /tmp/gatecandidate-home /tmp/gatecandidate-tmp
          sudo chown -R "$(id -u):20001" "$candidate_root"
          sudo chmod -R u+rwX,g+rX,o-rwx "$candidate_root"
          [[ "$(sudo git -c safe.directory="$candidate_root" -C "$candidate_root" rev-parse HEAD)" == "$HEAD_OID" ]]
          sudo git -c safe.directory="$candidate_root" -C "$candidate_root" diff --quiet --no-ext-diff HEAD --

      - name: Grant candidate writes only to generated output directories
        shell: bash
        run: |
          candidate_root=/tmp/gatecandidate-root/worktree
          [[ -d "$candidate_root" && ! -L "$candidate_root" ]]
          [[ "$(realpath -- "$candidate_root")" == "$candidate_root" ]]
          outputs=(
            apps/cli/dist
            apps/extension/dist
            apps/graph-service/dist
            apps/webview/dist
            packages/adapters/analyzer-typescript/dist
            packages/adapters/git-local/dist
            packages/adapters/store-sqlite/dist
            packages/application/dist
            packages/contracts/dist
            packages/domain/dist
            packages/service-client/dist
            node_modules/.vite
          )
          for relative_path in "${outputs[@]}"; do
            output_path="$candidate_root/$relative_path"
            resolved_output="$(realpath -m -- "$output_path")"
            if [[ "$resolved_output" != "$output_path" ]]; then
              echo "拒绝包含符号链接祖先的输出目录：$relative_path" >&2
              exit 1
            fi
            sudo install -d -o 20001 -g 20001 -m 0700 "$output_path"
            sudo chown -R 20001:20001 "$output_path"
            sudo chmod -R u+rwX,go-rwx "$output_path"
          done

      - name: Produce child gate evidence
        env:
          BASE_OID: ${{ inputs.base_oid }}
          HEAD_OID: ${{ inputs.head_oid }}
          OBJECT_FORMAT: ${{ inputs.object_format }}
          PRODUCER_WORKFLOW_SHA: ${{ inputs.producer_workflow_sha }}
          PROVIDER_REPOSITORY_ID: ${{ inputs.provider_repository_id }}
          TRUSTED_PNPM_BIN: /opt/trusted-pnpm/bin
        shell: bash
        run: |
          sudo env -i HOME="$PWD/trusted-harness-home" LANG=C.UTF-8 PATH="$TRUSTED_PNPM_BIN:$PATH" node trusted-harness/bin/produce-gate-evidence.mjs \
            --artifact-directory artifacts \
            --base-oid "$BASE_OID" \
            --candidate-root /tmp/gatecandidate-root/worktree \
            --controller-repository Rockyyy-S/code-graph-gate-controller \
            --gate-gid 20001 \
            --gate-home /tmp/gatecandidate-home \
            --gate-temp-directory /tmp/gatecandidate-tmp \
            --gate-uid 20001 \
            --head-oid "$HEAD_OID" \
            --object-format "$OBJECT_FORMAT" \
            --provider-repository-id "$PROVIDER_REPOSITORY_ID" \
            --trusted-record trusted-state/trusted/registry.json \
            --workflow-file produce-gate-evidence.yml \
            --workflow-sha "$PRODUCER_WORKFLOW_SHA"

      - name: Upload unsigned evidence from isolated execution job
        if: ${{ always() && hashFiles('artifacts/**') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # 固定 v4 提交
        with:
          if-no-files-found: error
          name: gate-evidence-raw-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.head_oid }}
          path: artifacts/
          retention-days: 1

      - name: Remove isolated candidate worktree
        if: ${{ always() }}
        shell: bash
        run: |
          sudo pkill -KILL -u 20001 || true
          sudo rm -rf -- /tmp/gatecandidate-root /tmp/gatecandidate-home /tmp/gatecandidate-tmp \
            /tmp/gatecandidate-install-home /tmp/gatecandidate-install-tmp

  gate-evidence:
    name: gate-evidence
    needs: gate-execution
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download unsigned evidence into a clean runner
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # 固定 v4 提交
        with:
          name: gate-evidence-raw-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.head_oid }}
          path: artifacts

      - name: Attest exact evidence artifact
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # 固定 v4 提交
        with:
          subject-path: artifacts/gate-evidence.json

      - name: Upload child evidence and bounded logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # 固定 v4 提交
        with:
          if-no-files-found: error
          name: gate-evidence-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.head_oid }}
          path: artifacts/
          retention-days: 14
