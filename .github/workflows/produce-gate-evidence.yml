name: produce-gate-evidence

on:
  workflow_call:
    inputs:
      base_oid:
        required: true
        type: string
      head_oid:
        required: true
        type: string
      object_format:
        required: true
        type: string
      provider_repository_id:
        required: true
        type: string
      producer_workflow_sha:
        required: true
        type: string
      repository:
        required: true
        type: string

permissions:
  actions: read
  attestations: write
  contents: read
  id-token: write

jobs:
  gate-evidence:
    name: gate-evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout immutable GateHarness
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 1
          path: trusted-harness
          persist-credentials: false
          ref: c5ea72c3e40607f59c01574d044e1c123ffeffec
          repository: Rockyyy-S/code-graph-gate-controller

      - name: Checkout trusted registry state
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 1
          path: trusted-state
          persist-credentials: false
          ref: main
          repository: Rockyyy-S/code-graph-gate-controller

      - name: Checkout exact candidate OID
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          path: candidate
          persist-credentials: false
          ref: ${{ inputs.head_oid }}
          repository: ${{ inputs.repository }}

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false
          version: 11.12.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0

      - name: Install candidate dependencies from lockfile
        working-directory: candidate
        run: pnpm install --frozen-lockfile

      - name: Produce child gate evidence
        run: >-
          node trusted-harness/bin/produce-gate-evidence.mjs
          --artifact-directory artifacts
          --base-oid "${{ inputs.base_oid }}"
          --candidate-root candidate
          --controller-repository Rockyyy-S/code-graph-gate-controller
          --head-oid "${{ inputs.head_oid }}"
          --object-format "${{ inputs.object_format }}"
          --provider-repository-id "${{ inputs.provider_repository_id }}"
          --trusted-record trusted-state/trusted/registry.json
          --workflow-file produce-gate-evidence.yml
          --workflow-sha "${{ inputs.producer_workflow_sha }}"

      - name: Attest exact evidence artifact
        if: ${{ always() && hashFiles('artifacts/gate-evidence.json') != '' }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: artifacts/gate-evidence.json

      - name: Upload child evidence and bounded logs
        if: ${{ always() && hashFiles('artifacts/**') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: error
          name: gate-evidence-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.head_oid }}
          path: artifacts/
          retention-days: 14
