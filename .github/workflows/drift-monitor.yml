name: architecture-drift-monitor

on:
  schedule:
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift-monitor:
    name: drift-monitor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout immutable monitor policy
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0

      - name: Mint read-only Drift Monitor App token
        id: monitor-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.DRIFT_MONITOR_APP_ID }}
          owner: Rockyyy-S
          private-key: ${{ secrets.DRIFT_MONITOR_PRIVATE_KEY }}
          repositories: code-graph

      - name: Verify provider ruleset and Controller identity
        env:
          CONTROLLER_APP_ID: ${{ secrets.CONTROLLER_APP_ID }}
          GH_TOKEN: ${{ steps.monitor-token.outputs.token }}
          TARGET_REPOSITORY: Rockyyy-S/code-graph
          TARGET_REPOSITORY_ID: "1303415307"
        run: node bin/run-drift-monitor.mjs
